<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog — Dash Chat</title>
  <meta name="description" content="Updates and thoughts from the Dash Chat team." />
  <link rel="canonical" href="https://dashchat.org/blog" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="alternate" type="application/rss+xml" title="Dash Chat RSS" href="https://dashchat.org/rss.xml" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Blog — Dash Chat" />
  <meta property="og:description" content="Updates and thoughts from the Dash Chat team." />
  <meta property="og:url" content="https://dashchat.org/blog" />

  <style>
    
    :root {
      --bg: #fcfcfc;
      --surface: #fff;
      --text: #111;
      --muted: #555;
      --faint: #888;
      --border: #e5e7eb;
      --accent: #1D4ED8;
      --accent-hover: #1e40af;
      --accent-light: #dbeafe;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0c0f;
        --surface: #111318;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --faint: #64748b;
        --border: #1e293b;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --accent-light: #1e3a5f;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Rubik", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    @supports (backdrop-filter: blur(12px)) {
      nav { background: color-mix(in srgb, var(--bg) 85%, transparent); }
    }
    .nav-inner {
      max-width: 960px; margin: 0 auto; padding: 0 24px;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      font-weight: 600; font-size: 1.05rem;
      color: var(--text); text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-links a {
      font-size: 0.9rem; font-weight: 500;
      color: var(--muted); text-decoration: none; transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links .gh-link { display: flex; align-items: center; color: var(--muted); transition: color 0.15s; }
    .nav-links .gh-link:hover { color: var(--text); }
    .nav-links .gh-link svg { display: block; }
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px; text-align: center;
      font-size: 0.85rem; color: var(--faint);
    }
    footer a { color: var(--faint); text-decoration: underline; text-underline-offset: 2px; }
    footer a:hover { color: var(--muted); }
  
    .blog-container {
      max-width: 720px; margin: 0 auto; padding: 0 24px;
    }
    .blog-header {
      padding: 100px 0 40px;
    }
    .blog-header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700; letter-spacing: -0.02em;
    }
    .post-list {
      padding-bottom: 80px;
      display: flex; flex-direction: column; gap: 0;
    }
    .post-item {
      display: block; text-decoration: none; color: inherit;
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      transition: opacity 0.15s;
    }
    .post-item:first-child { border-top: 1px solid var(--border); }
    .post-item:hover { opacity: 0.75; }
    .post-item h3 {
      font-size: 1.2rem; font-weight: 600;
      margin-bottom: 4px; color: var(--text);
    }
    .post-item-meta {
      font-size: 0.85rem; color: var(--faint);
      margin-bottom: 8px;
    }
    .post-item p {
      font-size: 0.95rem; color: var(--muted);
      line-height: 1.5; margin: 0;
    }
  </style>
</head>
<body>
  
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">Dash Chat</a>
      <div class="nav-links">
        <a href="/blog">Blog</a>
        <a href="/#get-involved">Get involved</a>
        <a href="https://github.com/dash-chat" target="_blank" rel="noopener noreferrer" class="gh-link" title="GitHub">
          <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
      </div>
    </div>
  </nav>

  <div class="blog-container">
    <header class="blog-header">
      <h1>Blog</h1>
    </header>
    <div class="post-list">

        <a href="/hello-world" class="post-item">
          <h3>Hello from Dash Chat</h3>
          <div class="post-item-meta">Eric Bear &middot; May 27, 2026</div>
          <p>We're building a secure messenger that works without internet. Here's what we're up to and how you can get involved.</p>
        </a>
    </div>
  </div>

  
  <footer>
    Open source under the <a href="https://github.com/dash-chat/dash-chat/blob/main/LICENSE" target="_blank" rel="noopener noreferrer">AGPL-3.0</a> license.
  </footer>
</body>
</html>
